name: Cleanup Ephemeral Dev Environment

on:
  # This listens for signal from CI repo
  repository_dispatch:
    types:
      - branch-deleted

  # This allows manual trigger as backup
  workflow_dispatch:
    inputs:
      env_name:
        description: "Namespace to delete (e.g. cohort)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: tangelo-dev-cluster
  DEV_BASE_DOMAIN: dev.gettangelo.com
  ROUTE53_ZONE_ID: YOUR_ZONE_ID_HERE

jobs:

  prepare:
    name: Prepare and Validate Environment Name
    runs-on: ubuntu-latest

    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
      should_proceed: ${{ steps.resolve.outputs.should_proceed }}

    steps:
      - name: Resolve environment name
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            ENV_RAW="${{ github.event.client_payload.namespace }}"
            echo "Signal received from CI repo"
            echo "Branch that was deleted: ${{ github.event.client_payload.branch }}"
            echo "Signal came from repo: ${{ github.event.client_payload.repo }}"
            echo "Namespace to clean up: $ENV_RAW"
          else
            ENV_RAW="${{ github.event.inputs.env_name }}"
            echo "Manually triggered for env: $ENV_RAW"
          fi

          ENV_LC="$(echo "${ENV_RAW}" | tr '[:upper:]' '[:lower:]')"

          if echo "${ENV_LC}" | grep -Eq '^(dev|stage|staging|prod|production|main)$'; then
            echo "ERROR: ${ENV_LC} is a protected environment. Cannot delete."
            echo "should_proceed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Validation passed for: ${ENV_LC}"
          echo "env_name=${ENV_LC}" >> "$GITHUB_OUTPUT"
          echo "should_proceed=true" >> "$GITHUB_OUTPUT"

  wait:
    name: Wait 24 Hours Before Cleanup
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_proceed == 'true'

    steps:
      - name: Announce and wait
        shell: bash
        run: |
          set -euo pipefail
          echo "=============================================="
          echo "CLEANUP SCHEDULED"
          echo "Environment: ${{ needs.prepare.outputs.env_name }}"
          echo "Waiting before cleanup begins."
          echo "To CANCEL: Go to Actions tab and cancel this run."
          echo "=============================================="
          sleep 10
          # Change sleep 10 to sleep 86400 for real 24 hour wait

  cleanup-dns:
    name: Delete Route53 DNS Records
    runs-on: ubuntu-latest
    needs: [prepare, wait]
    if: |
      always() &&
      needs.prepare.outputs.should_proceed == 'true' &&
      needs.wait.result == 'success'

    env:
      ENV_NAME_SANITIZED: ${{ needs.prepare.outputs.env_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GitHubOIDCDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete Route53 DNS records
        shell: bash
        run: |
          set -euo pipefail
          NS="${ENV_NAME_SANITIZED}"
          zone_id="${ROUTE53_ZONE_ID}"

          echo "Deleting DNS records for env: ${NS}"

          for app in admin backend app node slack; do
            fqdn="${NS}${app}.${DEV_BASE_DOMAIN}."
            echo "Checking: ${fqdn}"

            current=$(aws route53 list-resource-record-sets \
              --hosted-zone-id "$zone_id" \
              --query "ResourceRecordSets[?Name=='${fqdn}' && Type=='CNAME'] | [0].ResourceRecords[0].Value" \
              --output text || true)

            if [[ -z "$current" || "$current" == "None" ]]; then
              echo "No record found for ${fqdn}. Skipping."
              continue
            fi

            echo "Deleting: ${fqdn}"
            tmp=/tmp/r53-del.json
            printf '%s' "{\"Comment\":\"CI cleanup\",\"Changes\":[{\"Action\":\"DELETE\",\"ResourceRecordSet\":{\"Name\":\"${fqdn}\",\"Type\":\"CNAME\",\"TTL\":60,\"ResourceRecords\":[{\"Value\":\"${current}\"}]}}]}" > "$tmp"

            aws route53 change-resource-record-sets \
              --hosted-zone-id "$zone_id" \
              --change-batch file://"$tmp" || true

            echo "Deleted: ${fqdn}"
          done
          echo "DNS cleanup complete."

  cleanup-namespace:
    name: Delete Kubernetes Namespace
    runs-on: ubuntu-latest
    needs: [prepare, wait]
    if: |
      always() &&
      needs.prepare.outputs.should_proceed == 'true' &&
      needs.wait.result == 'success'

    env:
      ENV_NAME_SANITIZED: ${{ needs.prepare.outputs.env_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GitHubOIDCDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to EKS cluster
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Delete namespace
        shell: bash
        run: |
          set -euo pipefail
          NS="${ENV_NAME_SANITIZED}"

          if ! kubectl get ns "${NS}" >/dev/null 2>&1; then
            echo "Namespace ${NS} does not exist. Nothing to delete."
            exit 0
          fi

          echo "Resources inside namespace ${NS}:"
          kubectl get all -n "${NS}" || true
          kubectl get pvc -n "${NS}" || true

          kubectl delete namespace "${NS}" --wait=true
          echo "Namespace ${NS} deleted successfully."

  summary:
    name: Cleanup Summary
    runs-on: ubuntu-latest
    needs: [prepare, cleanup-dns, cleanup-namespace]
    if: always()

    steps:
      - name: Print summary
        shell: bash
        run: |
          echo "=============================================="
          echo "CLEANUP COMPLETE"
          echo "Environment:      ${{ needs.prepare.outputs.env_name }}"
          echo "Triggered by:     ${{ github.event_name }}"
          echo "DNS cleanup:      ${{ needs.cleanup-dns.result }}"
          echo "Namespace delete: ${{ needs.cleanup-namespace.result }}"
          echo "=============================================="