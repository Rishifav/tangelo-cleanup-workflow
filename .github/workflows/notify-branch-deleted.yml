name: Notify CD Repo on Branch Deletion

on:
  delete:    # Fires when any branch is deleted

jobs:
  notify-cd:
    name: Send Branch Deletion Signal to CD Repo
    runs-on: ubuntu-latest

    steps:
      - name: Check if feature branch was deleted
        id: check
        shell: bash
        run: |
          set -euo pipefail

          BRANCH_NAME="${{ github.event.ref }}"
          echo "Branch deleted: $BRANCH_NAME"

          # Only send signal for feature/* branches
          if [[ "$BRANCH_NAME" != feature/* ]]; then
            echo "Not a feature branch. No signal needed."
            echo "should_notify=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Sanitize: feature/cohort → cohort
          NAMESPACE=$(echo "$BRANCH_NAME" \
            | sed 's/feature\///' \
            | sed 's/[^a-zA-Z0-9-]/-/g' \
            | tr '[:upper:]' '[:lower:]')

          echo "Namespace extracted: $NAMESPACE"
          echo "should_notify=true" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

      - name: Send signal to CD repo
        if: steps.check.outputs.should_notify == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Sending signal to CD repo..."
          echo "Namespace: ${{ steps.check.outputs.namespace }}"

          curl -X POST \
            -H "Authorization: token ${{ secrets.CD_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Rishifav/tangelo-cleanup-workflow/dispatches \
            -d '{
              "event_type": "branch-deleted",
              "client_payload": {
                "namespace": "${{ steps.check.outputs.namespace }}",
                "branch": "${{ github.event.ref }}",
                "repo": "${{ github.repository }}"
              }
            }'

          echo "Signal sent successfully to CD repo."